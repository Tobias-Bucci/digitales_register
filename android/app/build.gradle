plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '21'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.8.3'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def allowDebugSigningForRelease = (localProperties.getProperty('allowDebugSigningForRelease')
        ?: System.getenv('ALLOW_DEBUG_SIGNING_FOR_RELEASE')
        ?: 'false').toBoolean()

android {
    namespace "it.bucci.digitalesregister"
    compileSdk 36

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "it.bucci.digitalesregister"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            // Default: require the private release keystore.
            // Local override (explicit): set allowDebugSigningForRelease=true in local.properties
            // or ALLOW_DEBUG_SIGNING_FOR_RELEASE=true as environment variable.
            signingConfig allowDebugSigningForRelease ? signingConfigs.debug : signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // this is my (michael) release key. Used for dev purposes only.
            if (signingConfigs.release.keyAlias == "myandroidkey") {
                applicationIdSuffix ".irelease"
                resValue "string", "app_name", "Register"
            } else {
                // This is the normal release build type
                resValue "string", "app_name", "Register"
            }
        }
        debug {
            applicationIdSuffix ".debug"
            resValue "string", "app_name", "dr DEBUG"
        }
        profile {
            applicationIdSuffix ".profile"
            resValue "string", "app_name", "dr PROFILE"
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
    // Required by Tink via androidx.security:security-crypto during R8 shrinking.
    implementation "com.google.errorprone:error_prone_annotations:2.28.0"
    implementation "com.google.code.findbugs:jsr305:3.0.2"
}
